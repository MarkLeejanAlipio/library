<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <script src="index.js" defer></script>
</head>
<body>
    <header>
        <div class="logo">
            <h1>My Library</h1>
            <p>Simple Book Collection Manager.</p>
        </div>
        <button class="new-book-btn">&plus; New Book</button>
    </header>
    <dialog class="new-book-modal" open>
        <div class="modal-header">
            <h3>Add New Book</h3>
            <button class="close-modal-btn">&times;</button>
        </div>
        <form method="dialog" class="book-form">
            <div class="form-group">
                <label for="title">Title</label>
                <input type="text" id="title" placeholder="e.g The Hobbit" required>
            </div>
            <div class="form-group">
                <label for="author">Author</label>
                <input type="text" id="author" placeholder="e.g J.R.R. Tolkien" required>
            </div>
            <div class="form-group">
                <label for="pages">Number of Pages</label>
                <input type="number" id="pages" placeholder="e.g 310" required>
            </div>
            <div class="form-group checkbox-group">
                <input type="checkbox" id="read-status">
                <label for="read-status">Have you read this book?</label>
            </div>
            <div class="modal-actions">
                <button type="button" class="cancel-btn">Cancel</button>
                <button type="submit" class="add-btn">Add to Library</button>
            </div>
        </form>
    </dialog>
    <main class="library-container">

    </main>
</body>
</html>
